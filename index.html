<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#2f6b4f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="本社カレンダー">
  <link rel="manifest" href="manifest.webmanifest">
  <title>カフェヨシノ 本社カレンダー</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f8f5;
      --surface: #ffffff;
      --line: #dde2d6;
      --text: #20251e;
      --muted: #687062;
      --brand: #2f6b4f;
      --brand-dark: #1f4c38;
      --coffee: #7b4b2a;
      --gold: #c9952d;
      --blue: #3f6f9f;
      --red: #bd5b4f;
      --shadow: 0 10px 30px rgba(31, 45, 34, .08);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans JP", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
    }

    button, input, select, textarea { font: inherit; }

    button {
      -webkit-tap-highlight-color: transparent;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(247, 248, 245, .94);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--line);
    }

    .topbar {
      max-width: 1160px;
      margin: 0 auto;
      padding: 14px 16px 10px;
      display: grid;
      gap: 12px;
    }

    .title-row,
    .date-row,
    .status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    h1 {
      margin: 0;
      font-size: 18px;
      line-height: 1.25;
      font-weight: 800;
    }

    .sub,
    .sync-state {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
    }

    .sub { margin-top: 3px; }

    .icon-button,
    .text-button,
    .add-button {
      border: 1px solid var(--line);
      background: var(--surface);
      color: var(--text);
      min-height: 40px;
      border-radius: 8px;
      display: inline-grid;
      place-items: center;
      box-shadow: 0 4px 14px rgba(24, 35, 26, .05);
      cursor: pointer;
    }

    .icon-button {
      width: 40px;
      font-size: 24px;
      line-height: 1;
    }

    .text-button,
    .add-button {
      padding: 0 13px;
      font-weight: 750;
      white-space: nowrap;
    }

    .add-button {
      border-color: var(--brand);
      background: var(--brand);
      color: white;
      grid-auto-flow: column;
      gap: 7px;
    }

    .date-nav {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      flex: 1;
    }

    .period {
      font-weight: 800;
      font-size: 17px;
      min-width: 145px;
    }

    .view-tabs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      border: 1px solid var(--line);
      background: #eef1ea;
      padding: 3px;
      border-radius: 8px;
      gap: 3px;
    }

    .tab {
      border: 0;
      background: transparent;
      border-radius: 6px;
      min-height: 36px;
      font-weight: 750;
      color: var(--muted);
      cursor: pointer;
    }

    .tab.active {
      background: var(--surface);
      color: var(--brand-dark);
      box-shadow: 0 2px 8px rgba(21, 38, 28, .08);
    }

    .filters {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 2px;
      scrollbar-width: none;
    }

    .filters::-webkit-scrollbar { display: none; }

    .chip {
      flex: 0 0 auto;
      border: 1px solid var(--line);
      background: var(--surface);
      border-radius: 999px;
      min-height: 34px;
      padding: 0 12px;
      color: var(--muted);
      font-weight: 750;
      cursor: pointer;
    }

    .chip.active {
      background: #e4f0e9;
      border-color: #a6c8b5;
      color: var(--brand-dark);
    }

    main {
      width: 100%;
      max-width: 1160px;
      margin: 0 auto;
      padding: 14px 16px 92px;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .empty {
      color: var(--muted);
      padding: 22px;
      text-align: center;
      font-weight: 700;
    }

    .day-layout {
      display: grid;
      grid-template-columns: 86px 1fr;
    }

    .hours {
      background: #fafbf8;
      border-right: 1px solid var(--line);
    }

    .hour,
    .slot {
      min-height: 64px;
      border-bottom: 1px solid #edf0e8;
    }

    .hour {
      color: var(--muted);
      font-size: 12px;
      padding: 8px;
      text-align: right;
    }

    .timeline {
      position: relative;
      min-height: 576px;
    }

    .slot { position: relative; }

    .event {
      display: grid;
      gap: 4px;
      border-left: 5px solid var(--brand);
      background: #f3f8f4;
      border-radius: 8px;
      padding: 8px 9px;
      box-shadow: 0 6px 16px rgba(28, 39, 29, .08);
      cursor: pointer;
      min-width: 0;
    }

    .timeline .event {
      position: absolute;
      left: 8px;
      right: 8px;
    }

    .event .who {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 12px;
      color: var(--muted);
      font-weight: 800;
      min-width: 0;
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 999px;
      background: var(--brand);
      flex: 0 0 auto;
    }

    .event strong {
      font-size: 14px;
      line-height: 1.3;
      overflow-wrap: anywhere;
    }

    .event small {
      color: var(--muted);
      font-weight: 650;
      overflow-wrap: anywhere;
    }

    .president { border-color: var(--brand); background: #eef8f1; }
    .senmu { border-color: var(--coffee); background: #fbf4ee; }
    .tamaki { border-color: var(--blue); background: #eef5fb; }
    .shinohata { border-color: var(--gold); background: #fff8e8; }
    .tsuge { border-color: #8a6fba; background: #f5f0ff; }
    .nakata { border-color: var(--red); background: #fff1ef; }
    .yano { border-color: #5960a7; background: #f1f2ff; }
    .imanishi { border-color: #5e7d36; background: #f1f7e9; }
    .unknown { border-color: #879083; background: #f4f6f2; }

    .president .dot { background: var(--brand); }
    .senmu .dot { background: var(--coffee); }
    .tamaki .dot { background: var(--blue); }
    .shinohata .dot { background: var(--gold); }
    .tsuge .dot { background: #8a6fba; }
    .nakata .dot { background: var(--red); }
    .yano .dot { background: #5960a7; }
    .imanishi .dot { background: #5e7d36; }
    .unknown .dot { background: #879083; }

    .week-list { display: grid; }

    .week-day {
      display: grid;
      grid-template-columns: 86px 1fr;
      border-bottom: 1px solid var(--line);
      min-height: 104px;
    }

    .week-day:last-child { border-bottom: 0; }

    .week-date {
      background: #fafbf8;
      border-right: 1px solid var(--line);
      padding: 12px 8px;
      text-align: center;
    }

    .week-date b {
      display: block;
      font-size: 22px;
      line-height: 1;
    }

    .week-date span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 750;
    }

    .week-events {
      display: grid;
      gap: 9px;
      padding: 10px;
      align-content: start;
    }

    .month-grid {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
    }

    .weekday {
      min-height: 34px;
      display: grid;
      place-items: center;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      background: #fafbf8;
      border-right: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
    }

    .weekday:last-child { border-right: 0; }

    .date-cell {
      min-height: 112px;
      padding: 7px;
      border-right: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      background: #fff;
      display: grid;
      align-content: start;
      gap: 5px;
      cursor: pointer;
      min-width: 0;
    }

    .date-cell:nth-child(7n) { border-right: 0; }

    .date-num {
      font-size: 12px;
      font-weight: 800;
      color: var(--muted);
    }

    .date-cell.today {
      background: #f6fbf7;
      box-shadow: inset 0 0 0 2px #a6c8b5;
    }

    .date-cell.outside {
      background: #fafbf8;
      opacity: .74;
    }

    .mini-event {
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      border-radius: 5px;
      padding: 4px 6px;
      font-size: 11px;
      font-weight: 750;
      background: #eef8f1;
      color: #21372b;
      border-left: 4px solid var(--brand);
    }

    .more {
      color: var(--brand-dark);
      font-size: 11px;
      font-weight: 800;
    }

    .hidden { display: none; }

    .fab {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 12;
      width: 58px;
      height: 58px;
      border-radius: 50%;
      border: 0;
      background: var(--brand);
      color: white;
      font-size: 30px;
      line-height: 1;
      box-shadow: 0 12px 24px rgba(47, 107, 79, .32);
      cursor: pointer;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(15, 22, 17, .34);
      display: none;
      align-items: end;
      z-index: 20;
    }

    .modal-backdrop.open { display: flex; }

    .modal {
      width: 100%;
      max-width: 600px;
      margin: 0 auto;
      background: var(--surface);
      border-radius: 8px 8px 0 0;
      box-shadow: 0 -18px 50px rgba(0, 0, 0, .20);
      padding: 16px;
      max-height: 88vh;
      overflow-y: auto;
    }

    .modal h2 {
      margin: 0 0 14px;
      font-size: 18px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    label.wide,
    .wide { grid-column: 1 / -1; }

    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      min-height: 42px;
      padding: 9px 10px;
      color: var(--text);
      background: #fff;
    }

    textarea {
      resize: vertical;
      min-height: 78px;
    }

    .modal-actions {
      display: flex;
      justify-content: end;
      gap: 10px;
      margin-top: 14px;
    }

    .secondary,
    .primary {
      min-height: 42px;
      border-radius: 8px;
      padding: 0 14px;
      font-weight: 800;
      cursor: pointer;
    }

    .secondary {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
    }

    .primary {
      border: 1px solid var(--brand);
      background: var(--brand);
      color: #fff;
    }

    .notice {
      margin: 0 0 12px;
      padding: 10px 12px;
      background: #f4f8f1;
      border: 1px solid #d9e7d3;
      border-radius: 8px;
      color: var(--brand-dark);
      font-size: 13px;
      line-height: 1.5;
    }

    @media (min-width: 780px) {
      .topbar {
        grid-template-columns: 1fr auto;
        align-items: center;
      }

      .title-row { grid-column: 1 / -1; }
      .date-row { justify-content: start; }
      .view-tabs { width: 310px; }
      main { padding-top: 22px; }
      .fab { display: none; }
      .modal-backdrop { align-items: center; }
      .modal { border-radius: 8px; }
    }

    @media (max-width: 640px) {
      .desktop-add { display: none; }
      .status-row { align-items: stretch; }
      .status-row .text-button { min-width: 72px; }
      .period {
        min-width: 0;
        flex: 1;
        text-align: center;
        font-size: 15px;
      }

      .day-layout { grid-template-columns: 58px 1fr; }
      .hour { padding: 8px 5px; }
      .week-day { grid-template-columns: 58px 1fr; }
      .date-cell {
        min-height: 78px;
        padding: 4px;
      }

      .mini-event {
        padding: 3px 4px;
        font-size: 10px;
      }

      .form-grid { grid-template-columns: 1fr; }
      .sync-state { flex: 1; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="topbar">
        <div class="title-row">
          <div>
            <h1>カフェヨシノ 本社カレンダー</h1>
            <div class="sub">本社共有Googleカレンダーを、担当者名つきで表示</div>
          </div>
          <button class="add-button desktop-add" type="button" data-open-event aria-label="予定を追加">
            <span aria-hidden="true">＋</span><span>予定追加</span>
          </button>
        </div>

        <div class="date-row">
          <div class="date-nav" aria-label="日付移動">
            <button class="icon-button" type="button" id="prevButton" aria-label="前へ">‹</button>
            <div class="period" id="periodLabel"></div>
            <button class="icon-button" type="button" id="nextButton" aria-label="次へ">›</button>
          </div>
          <button class="text-button" type="button" id="todayButton">今日</button>
        </div>

        <div class="view-tabs" role="tablist" aria-label="表示切替">
          <button class="tab active" type="button" data-view="day">日</button>
          <button class="tab" type="button" data-view="week">週</button>
          <button class="tab" type="button" data-view="month">月</button>
        </div>

        <div class="filters" id="memberFilters" aria-label="メンバー絞り込み"></div>

        <div class="status-row">
          <div class="sync-state" id="syncState">デモ予定を表示中。Google設定を入れると共有カレンダーと同期できます。</div>
          <button class="text-button" type="button" id="configButton">設定</button>
          <button class="text-button" type="button" id="syncButton">同期</button>
        </div>
      </div>
    </header>

    <main>
      <section class="panel" id="dayView" aria-label="日表示"></section>
      <section class="panel hidden" id="weekView" aria-label="週表示"></section>
      <section class="panel hidden" id="monthView" aria-label="月表示"></section>
    </main>

    <button class="fab" type="button" data-open-event aria-label="予定を追加">＋</button>
  </div>

  <div class="modal-backdrop" id="eventModal" role="dialog" aria-modal="true" aria-labelledby="eventTitle">
    <div class="modal">
      <h2 id="eventTitle">予定追加</h2>
      <p class="notice">Google連携後は、共有カレンダーに「担当者：内容」の形で保存します。</p>
      <div class="form-grid">
        <label>
          担当者
          <select id="eventAssignee"></select>
        </label>
        <label>
          日付
          <input id="eventDate" type="date">
        </label>
        <label>
          開始
          <input id="eventStart" type="time" value="09:00">
        </label>
        <label>
          終了
          <input id="eventEnd" type="time" value="10:00">
        </label>
        <label class="wide">
          内容
          <input id="eventSummary" type="text" placeholder="取引先打ち合わせ">
        </label>
        <label class="wide">
          場所・メモ
          <textarea id="eventMemo" placeholder="本社 会議室"></textarea>
        </label>
      </div>
      <div class="modal-actions">
        <button class="secondary" type="button" data-close-modal>閉じる</button>
        <button class="primary" type="button" id="saveEventButton">保存</button>
      </div>
    </div>
  </div>

  <div class="modal-backdrop" id="configModal" role="dialog" aria-modal="true" aria-labelledby="configTitle">
    <div class="modal">
      <h2 id="configTitle">Googleカレンダー設定</h2>
      <p class="notice">本番運用では、Google CloudでAPIキー・OAuthクライアントIDを作り、本社共有カレンダーIDを入れます。</p>
      <div class="form-grid">
        <label class="wide">
          共有カレンダーID
          <input id="calendarIdInput" type="text" placeholder="xxxx@group.calendar.google.com">
        </label>
        <label class="wide">
          APIキー
          <input id="apiKeyInput" type="password" placeholder="Google Calendar API key">
        </label>
        <label class="wide">
          OAuthクライアントID
          <input id="clientIdInput" type="password" placeholder="xxxx.apps.googleusercontent.com">
        </label>
        <label class="wide">
          メールと名前の対応表
          <textarea id="memberMapInput" placeholder="imanishi0305@gmail.com=今西&#10;president@example.com=社長"></textarea>
        </label>
      </div>
      <div class="modal-actions">
        <button class="secondary" type="button" data-close-modal>閉じる</button>
        <button class="primary" type="button" id="saveConfigButton">設定を保存</button>
      </div>
    </div>
  </div>

  <script src="app-config.js"></script>
  <script>
    window.CAFE_YOSHINO_CONFIG = window.CAFE_YOSHINO_CONFIG || {
      calendarId: '',
      apiKey: '',
      clientId: '',
      memberMap: [
        'mner4k861@gmail.com=社長',
        'mie.y.0831@gmail.com=専務',

        'tsugeteeeee5@gmail.com=柘植',

      ].join('\n')
    };
  </script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script>
    const MEMBERS = [
      { name: '社長', key: 'president' },
      { name: '専務', key: 'senmu' },
      { name: '玉木', key: 'tamaki' },
      { name: '篠畑', key: 'shinohata' },
      { name: '柘植', key: 'tsuge' },
      { name: '中田', key: 'nakata' },
      { name: '矢野', key: 'yano' },
      { name: '今西', key: 'imanishi' }
    ];

    const WEEKDAYS = ['日', '月', '火', '水', '木', '金', '土'];
    const CONFIG_KEY = 'cafeYoshinoCalendarConfig';
    const SCOPES = 'https://www.googleapis.com/auth/calendar.events';
    const AUTO_SYNC_INTERVAL_MS = 5 * 60 * 1000;
    const APP_TODAY = startOfDay(new Date());
    const DEFAULT_MEMBER_MAP = [
      'mner4k861@gmail.com=社長',
      'mie.y.0831@gmail.com=専務',
      'tamaki19740902@gmail.com=玉木',
      'shinohata.tenpo.pc@gmail.com=篠畑',
      'tsugeteeeee5@gmail.com=柘植',
      'nakata.cy@gmail.com=中田',
      'yano.cy2@gmail.com=矢野',
      'imanishi0305@gmail.com=今西'
    ].join('\n');
    const FILE_CONFIG = window.CAFE_YOSHINO_CONFIG || {};

    const state = {
      view: 'day',
      cursor: APP_TODAY,
      selectedMember: '全員',
      events: [],
      token: '',
      config: loadConfig()
    };

    const demoEvents = [
      makeLocalEvent('demo-1', toDateInput(APP_TODAY), '09:00', '10:00', '社長', '取引先打ち合わせ', '本社 会議室'),
      makeLocalEvent('demo-2', toDateInput(APP_TODAY), '10:30', '12:00', '玉木', '店舗訪問', '名駅店・栄店'),
      makeLocalEvent('demo-3', toDateInput(APP_TODAY), '13:00', '14:00', '篠畑', '面接', 'オンライン'),
      makeLocalEvent('demo-4', toDateInput(APP_TODAY), '15:00', '16:30', '中田', '業者対応', '厨房機器 見積確認'),
      makeLocalEvent('demo-5', toDateInput(addDays(APP_TODAY, 1)), '10:00', '11:30', '専務', '銀行打ち合わせ', ''),
      makeLocalEvent('demo-6', toDateInput(addDays(APP_TODAY, 1)), '14:00', '15:00', '矢野', '業者対応', ''),
      makeLocalEvent('demo-7', toDateInput(addDays(APP_TODAY, 2)), '09:30', '10:30', '今西', '販促確認', ''),
      makeLocalEvent('demo-8', toDateInput(addDays(APP_TODAY, 2)), '13:00', '14:30', '篠畑', '採用面談', ''),
      makeLocalEvent('demo-9', toDateInput(addDays(APP_TODAY, 5)), '11:00', '12:00', '社長', '月次確認', ''),
      makeLocalEvent('demo-10', toDateInput(addDays(APP_TODAY, 6)), '16:00', '17:00', '中田', '棚卸確認', '')
    ];

    const dayView = document.getElementById('dayView');
    const weekView = document.getElementById('weekView');
    const monthView = document.getElementById('monthView');
    const periodLabel = document.getElementById('periodLabel');
    const syncState = document.getElementById('syncState');

    initialize();

    function initialize() {
      state.events = [...demoEvents];
      renderFilters();
      fillMemberSelect();
      bindActions();
      applyConfigToForm();
      registerAppShell();
      startAutoSync();
      render();
    }

    function bindActions() {
      document.querySelectorAll('.tab').forEach((tab) => {
        tab.addEventListener('click', () => {
          state.view = tab.dataset.view;
          document.querySelectorAll('.tab').forEach((item) => item.classList.toggle('active', item === tab));
          render();
        });
      });

      document.getElementById('prevButton').addEventListener('click', () => moveCursor(-1));
      document.getElementById('nextButton').addEventListener('click', () => moveCursor(1));
      document.getElementById('todayButton').addEventListener('click', () => {
        state.cursor = startOfDay(new Date());
        render();
      });

      document.querySelectorAll('[data-open-event]').forEach((button) => {
        button.addEventListener('click', () => openEventModal(state.cursor));
      });

      document.getElementById('configButton').addEventListener('click', () => openModal('configModal'));
      document.getElementById('syncButton').addEventListener('click', syncGoogleCalendar);
      document.getElementById('saveConfigButton').addEventListener('click', saveConfig);
      document.getElementById('saveEventButton').addEventListener('click', saveEvent);

      document.querySelectorAll('[data-close-modal]').forEach((button) => {
        button.addEventListener('click', () => closeModals());
      });

      document.querySelectorAll('.modal-backdrop').forEach((backdrop) => {
        backdrop.addEventListener('click', (event) => {
          if (event.target === backdrop) closeModals();
        });
      });
    }

    function registerAppShell() {
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('service-worker.js').catch(() => {});
      }
    }

    function startAutoSync() {
      window.setInterval(() => {
        if (hasGoogleConfig() && state.token && !document.hidden) syncGoogleCalendar({ silent: true });
      }, AUTO_SYNC_INTERVAL_MS);

      document.addEventListener('visibilitychange', () => {
        if (hasGoogleConfig() && state.token && !document.hidden) syncGoogleCalendar({ silent: true });
      });
    }

    function renderFilters() {
      const filterRoot = document.getElementById('memberFilters');
      filterRoot.innerHTML = ['全員', ...MEMBERS.map((member) => member.name)]
        .map((name) => `<button class="chip${name === state.selectedMember ? ' active' : ''}" type="button" data-member="${name}">${name}</button>`)
        .join('');
      filterRoot.querySelectorAll('.chip').forEach((chip) => {
        chip.addEventListener('click', () => {
          state.selectedMember = chip.dataset.member;
          renderFilters();
          render();
        });
      });
    }

    function fillMemberSelect() {
      document.getElementById('eventAssignee').innerHTML = MEMBERS
        .map((member) => `<option value="${member.name}">${member.name}</option>`)
        .join('');
    }

    function render() {
      periodLabel.textContent = periodText();
      dayView.classList.toggle('hidden', state.view !== 'day');
      weekView.classList.toggle('hidden', state.view !== 'week');
      monthView.classList.toggle('hidden', state.view !== 'month');
      renderDay();
      renderWeek();
      renderMonth();
      updateSyncText();
    }

    function renderDay() {
      const events = filteredEvents().filter((event) => isSameDate(event.start, state.cursor)).sort(sortByStart);
      const hours = Array.from({ length: 9 }, (_, index) => 9 + index);
      dayView.innerHTML = `
        <div class="day-layout">
          <div class="hours">${hours.map((hour) => `<div class="hour">${hour}:00</div>`).join('')}</div>
          <div class="timeline">
            ${hours.map(() => '<div class="slot"></div>').join('')}
            ${events.map(dayEventHtml).join('')}
            ${events.length ? '' : '<div class="empty">この日の予定はありません</div>'}
          </div>
        </div>
      `;
    }

    function renderWeek() {
      const start = weekStart(state.cursor);
      const days = Array.from({ length: 7 }, (_, index) => addDays(start, index));
      weekView.innerHTML = `<div class="week-list">${days.map((day) => {
        const events = filteredEvents().filter((event) => isSameDate(event.start, day)).sort(sortByStart);
        return `
          <div class="week-day">
            <div class="week-date"><b>${day.getDate()}</b><span>${WEEKDAYS[day.getDay()]}${isToday(day) ? ' 今日' : ''}</span></div>
            <div class="week-events">
              ${events.length ? events.map(listEventHtml).join('') : '<div class="empty">予定なし</div>'}
            </div>
          </div>
        `;
      }).join('')}</div>`;
    }

    function renderMonth() {
      const first = new Date(state.cursor.getFullYear(), state.cursor.getMonth(), 1);
      const gridStart = addDays(first, -first.getDay());
      const days = Array.from({ length: 42 }, (_, index) => addDays(gridStart, index));
      monthView.innerHTML = `
        <div class="month-grid">
          ${WEEKDAYS.map((day) => `<div class="weekday">${day}</div>`).join('')}
          ${days.map((day) => monthCellHtml(day)).join('')}
        </div>
      `;
      monthView.querySelectorAll('.date-cell').forEach((cell) => {
        cell.addEventListener('click', () => {
          state.cursor = parseDate(cell.dataset.date);
          state.view = 'day';
          document.querySelectorAll('.tab').forEach((tab) => tab.classList.toggle('active', tab.dataset.view === 'day'));
          render();
        });
      });
    }

    function dayEventHtml(event) {
      const startHour = 9;
      const minutesFromStart = Math.max(0, (event.start.getHours() - startHour) * 60 + event.start.getMinutes());
      const duration = Math.max(42, (event.end - event.start) / 60000);
      const top = Math.round(minutesFromStart / 60 * 64 + 6);
      const height = Math.round(duration / 60 * 64 - 6);
      return listEventHtml(event, `style="top:${top}px;height:${height}px"`);
    }

    function listEventHtml(event, attrs = '') {
      const member = memberFor(event.assignee);
      return `
        <article class="event ${member.key}" ${attrs}>
          <div class="who"><span class="dot"></span>${escapeHtml(event.assignee)}　${formatTime(event.start)}-${formatTime(event.end)}</div>
          <strong>${escapeHtml(event.title)}</strong>
          ${event.location ? `<small>${escapeHtml(event.location)}</small>` : ''}
        </article>
      `;
    }

    function monthCellHtml(day) {
      const events = filteredEvents().filter((event) => isSameDate(event.start, day)).sort(sortByStart);
      const shown = events.slice(0, 2);
      const outside = day.getMonth() !== state.cursor.getMonth();
      const today = isToday(day);
      return `
        <div class="date-cell${outside ? ' outside' : ''}${today ? ' today' : ''}" data-date="${toDateInput(day)}">
          <div class="date-num">${day.getDate()}</div>
          ${shown.map((event) => miniEventHtml(event)).join('')}
          ${events.length > shown.length ? `<div class="more">ほか${events.length - shown.length}件</div>` : ''}
        </div>
      `;
    }

    function miniEventHtml(event) {
      const member = memberFor(event.assignee);
      return `<div class="mini-event ${member.key}">${escapeHtml(event.assignee)} ${escapeHtml(event.title)}</div>`;
    }

    function moveCursor(direction) {
      if (state.view === 'day') state.cursor = addDays(state.cursor, direction);
      if (state.view === 'week') state.cursor = addDays(state.cursor, direction * 7);
      if (state.view === 'month') state.cursor = new Date(state.cursor.getFullYear(), state.cursor.getMonth() + direction, 1);
      render();
    }

    function periodText() {
      if (state.view === 'day') return `${state.cursor.getFullYear()}年${state.cursor.getMonth() + 1}月${state.cursor.getDate()}日（${WEEKDAYS[state.cursor.getDay()]}）`;
      if (state.view === 'week') {
        const start = weekStart(state.cursor);
        const end = addDays(start, 6);
        return `${start.getFullYear()}年${start.getMonth() + 1}月${start.getDate()}日-${end.getMonth() + 1}月${end.getDate()}日`;
      }
      return `${state.cursor.getFullYear()}年${state.cursor.getMonth() + 1}月`;
    }

    function openEventModal(date) {
      document.getElementById('eventDate').value = toDateInput(date);
      document.getElementById('eventSummary').value = '';
      document.getElementById('eventMemo').value = '';
      openModal('eventModal');
    }

    function openModal(id) {
      closeModals();
      document.getElementById(id).classList.add('open');
    }

    function closeModals() {
      document.querySelectorAll('.modal-backdrop').forEach((modal) => modal.classList.remove('open'));
    }

    async function saveEvent() {
      const assignee = document.getElementById('eventAssignee').value;
      const date = document.getElementById('eventDate').value;
      const start = document.getElementById('eventStart').value;
      const end = document.getElementById('eventEnd').value;
      const title = document.getElementById('eventSummary').value.trim();
      const memo = document.getElementById('eventMemo').value.trim();

      if (!title) {
        setSyncText('内容を入れてください。');
        return;
      }

      const localEvent = makeLocalEvent(`local-${Date.now()}`, date, start, end, assignee, title, memo);

      if (hasGoogleConfig()) {
        try {
          await ensureToken({ interactive: true });
          await createGoogleEvent(localEvent);
          setSyncText('Googleカレンダーに保存しました。');
          closeModals();
          await syncGoogleCalendar();
          return;
        } catch (error) {
          setSyncText(`Google保存に失敗しました。画面には一時追加します。`);
        }
      }

      state.events.push(localEvent);
      state.cursor = localEvent.start;
      closeModals();
      render();
    }

    async function syncGoogleCalendar(options = {}) {
      if (!hasGoogleConfig()) {
        openModal('configModal');
        setSyncText('Google設定を入れると同期できます。いまはデモ予定を表示しています。');
        return;
      }

      try {
        if (!options.silent) setSyncText('Googleカレンダーと同期中...');
        await ensureToken({ interactive: !options.silent });
        const { start, end } = visibleRange();
        const params = new URLSearchParams({
          key: state.config.apiKey,
          timeMin: start.toISOString(),
          timeMax: end.toISOString(),
          singleEvents: 'true',
          orderBy: 'startTime',
          maxResults: '250'
        });
        const response = await fetch(`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(state.config.calendarId)}/events?${params}`, {
          headers: { Authorization: `Bearer ${state.token}` }
        });
        if (!response.ok) throw new Error(`sync failed ${response.status}`);
        const data = await response.json();
        state.events = (data.items || []).map(fromGoogleEvent).filter(Boolean);
        setSyncText(`${new Date().toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' })} に同期しました。`);
        render();
      } catch (error) {
        setSyncText('同期できませんでした。設定と共有権限を確認してください。');
      }
    }

    async function ensureToken(options = {}) {
      if (state.token) return state.token;
      if (!options.interactive) {
        throw new Error('Google sign-in is required');
      }
      if (!window.google || !google.accounts || !google.accounts.oauth2) {
        throw new Error('Google Identity Services is not ready');
      }

      return new Promise((resolve, reject) => {
        const client = google.accounts.oauth2.initTokenClient({
          client_id: state.config.clientId,
          scope: SCOPES,
          callback: (response) => {
            if (response.error) {
              reject(new Error(response.error));
              return;
            }
            state.token = response.access_token;
            resolve(state.token);
          }
        });
        client.requestAccessToken({ prompt: 'consent' });
      });
    }

    async function createGoogleEvent(event) {
      const response = await fetch(`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(state.config.calendarId)}/events?key=${encodeURIComponent(state.config.apiKey)}`, {
        method: 'POST',
        headers: {
          Authorization: `Bearer ${state.token}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          summary: `${event.assignee}：${event.title}`,
          location: event.location,
          start: { dateTime: event.start.toISOString() },
          end: { dateTime: event.end.toISOString() },
          extendedProperties: {
            shared: {
              assignee: event.assignee,
              app: 'cafe-yoshino-hq'
            }
          }
        })
      });
      if (!response.ok) throw new Error(`create failed ${response.status}`);
    }

    function fromGoogleEvent(item) {
      const rawTitle = item.summary || '予定';
      const parsed = parseAssignee(
        rawTitle,
        item.extendedProperties?.shared?.assignee,
        item.creator?.email,
        item.organizer?.email,
        item.creator?.displayName
      );
      const start = new Date(item.start?.dateTime || `${item.start?.date}T09:00:00`);
      const end = new Date(item.end?.dateTime || `${item.end?.date}T10:00:00`);
      if (Number.isNaN(start.getTime()) || Number.isNaN(end.getTime())) return null;
      return {
        id: item.id,
        assignee: parsed.assignee,
        title: parsed.title,
        start,
        end,
        location: item.location || ''
      };
    }

    function parseAssignee(summary, sharedAssignee, creatorEmail, organizerEmail, creatorName) {
      if (sharedAssignee && MEMBERS.some((member) => member.name === sharedAssignee)) {
        return { assignee: sharedAssignee, title: summary.replace(new RegExp(`^${escapeRegExp(sharedAssignee)}[：:]\\s*`), '') };
      }

      const match = summary.match(/^(.+?)[：:]\s*(.+)$/);
      if (match && MEMBERS.some((member) => member.name === match[1])) {
        return { assignee: match[1], title: match[2] };
      }

      const mappedAssignee = assigneeFromEmail(creatorEmail) || assigneeFromEmail(organizerEmail) || assigneeFromName(creatorName);
      if (mappedAssignee) {
        return { assignee: mappedAssignee, title: summary };
      }

      return { assignee: '未設定', title: summary };
    }

    function assigneeFromEmail(email) {
      if (!email) return '';
      const map = memberEmailMap();
      return map.get(String(email).trim().toLowerCase()) || '';
    }

    function assigneeFromName(name) {
      if (!name) return '';
      const normalized = String(name).trim();
      const exact = MEMBERS.find((member) => member.name === normalized);
      if (exact) return exact.name;
      const included = MEMBERS.find((member) => normalized.includes(member.name));
      return included ? included.name : '';
    }

    function memberEmailMap() {
      const map = new Map();
      const rows = `${DEFAULT_MEMBER_MAP}\n${state.config.memberMap || ''}`.split(/\r?\n/);
      rows.forEach((row) => {
        const trimmed = row.trim();
        if (!trimmed) return;
        const parts = trimmed.split(/\s*[=,\t]\s*|\s{2,}/).filter(Boolean);
        if (parts.length < 2) return;
        const left = parts[0].trim();
        const right = parts.slice(1).join(' ').trim();
        const email = left.includes('@') ? left : right;
        const name = left.includes('@') ? right : left;
        if (email.includes('@') && name) map.set(email.toLowerCase(), name);
      });
      return map;
    }

    function saveConfig() {
      state.config = {
        calendarId: document.getElementById('calendarIdInput').value.trim(),
        apiKey: document.getElementById('apiKeyInput').value.trim(),
        clientId: document.getElementById('clientIdInput').value.trim(),
        memberMap: document.getElementById('memberMapInput').value.trim()
      };
      localStorage.setItem(CONFIG_KEY, JSON.stringify(state.config));
      state.token = '';
      closeModals();
      render();
      setSyncText(hasGoogleConfig() ? '設定を保存しました。同期ボタンでGoogleカレンダーを読み込みます。' : '設定が未入力です。');
    }

    function loadConfig() {
      try {
        const saved = JSON.parse(localStorage.getItem(CONFIG_KEY)) || {};
        return {
          calendarId: saved.calendarId || FILE_CONFIG.calendarId || '',
          apiKey: saved.apiKey || FILE_CONFIG.apiKey || '',
          clientId: saved.clientId || FILE_CONFIG.clientId || '',
          memberMap: [FILE_CONFIG.memberMap || '', saved.memberMap || ''].filter(Boolean).join('\n')
        };
      } catch {
        return {
          calendarId: FILE_CONFIG.calendarId || '',
          apiKey: FILE_CONFIG.apiKey || '',
          clientId: FILE_CONFIG.clientId || '',
          memberMap: FILE_CONFIG.memberMap || ''
        };
      }
    }

    function applyConfigToForm() {
      document.getElementById('calendarIdInput').value = state.config.calendarId || '';
      document.getElementById('apiKeyInput').value = state.config.apiKey || '';
      document.getElementById('clientIdInput').value = state.config.clientId || '';
      document.getElementById('memberMapInput').value = state.config.memberMap || '';
    }

    function hasGoogleConfig() {
      return Boolean(state.config.calendarId && state.config.apiKey && state.config.clientId);
    }

    function updateSyncText() {
      if (hasGoogleConfig() && !syncState.dataset.manual) {
        syncState.textContent = 'Google設定あり。同期ボタンで共有カレンダーを更新します。';
      }
    }

    function setSyncText(text) {
      syncState.dataset.manual = 'true';
      syncState.textContent = text;
    }

    function visibleRange() {
      if (state.view === 'day') {
        return { start: startOfDay(state.cursor), end: addDays(startOfDay(state.cursor), 1) };
      }
      if (state.view === 'week') {
        const start = weekStart(state.cursor);
        return { start, end: addDays(start, 7) };
      }
      const start = new Date(state.cursor.getFullYear(), state.cursor.getMonth(), 1);
      return { start, end: new Date(state.cursor.getFullYear(), state.cursor.getMonth() + 1, 1) };
    }

    function filteredEvents() {
      if (state.selectedMember === '全員') return state.events;
      return state.events.filter((event) => event.assignee === state.selectedMember);
    }

    function memberFor(name) {
      return MEMBERS.find((member) => member.name === name) || { name, key: 'unknown' };
    }

    function makeLocalEvent(id, date, startTime, endTime, assignee, title, location) {
      return {
        id,
        assignee,
        title,
        location,
        start: parseDateTime(date, startTime),
        end: parseDateTime(date, endTime)
      };
    }

    function parseDateTime(date, time) {
      const [year, month, day] = date.split('-').map(Number);
      const [hour, minute] = time.split(':').map(Number);
      return new Date(year, month - 1, day, hour, minute);
    }

    function parseDate(value) {
      const [year, month, day] = value.split('-').map(Number);
      return new Date(year, month - 1, day);
    }

    function addDays(date, amount) {
      const next = new Date(date);
      next.setDate(next.getDate() + amount);
      return next;
    }

    function startOfDay(date) {
      return new Date(date.getFullYear(), date.getMonth(), date.getDate());
    }

    function weekStart(date) {
      return addDays(startOfDay(date), -date.getDay());
    }

    function isSameDate(a, b) {
      return a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate();
    }

    function isToday(date) {
      return isSameDate(date, new Date());
    }

    function sortByStart(a, b) {
      return a.start - b.start;
    }

    function formatTime(date) {
      return `${String(date.getHours()).padStart(2, '0')}:${String(date.getMinutes()).padStart(2, '0')}`;
    }

    function toDateInput(date) {
      return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, (char) => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
      }[char]));
    }

    function escapeRegExp(value) {
      return String(value).replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    }
  </script>
</body>
